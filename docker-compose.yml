services:
  unifi-adguard-sync:
    build: .
    container_name: unifi-adguard-sync
    restart: unless-stopped
    env_file: .env
    networks:
      - proxy_net
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "find /data/last_sync_ok -mmin -15 | grep -q ."]
      interval: 60s
      timeout: 5s
      retries: 3

networks:
  proxy_net:
    external: true
